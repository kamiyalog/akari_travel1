<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>朱里チャットゲーム 試作版</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="chat-header">
      <div>
        <div class="chat-name">朱里</div>
        <div class="chat-status">オンライン</div>
      </div>
      <button id="menuButton" class="menu-button">☰</button>
    </header>

    <main id="chatLog" class="chat-log"></main>

    <footer class="input-area">
      <input id="playerInput" type="text" placeholder="メッセージを入力" autocomplete="off" disabled />
      <button id="sendButton" disabled>送信</button>
    </footer>
  </div>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
